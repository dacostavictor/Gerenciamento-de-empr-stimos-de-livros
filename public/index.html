<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Inicial</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2>Cadastro de usuários</h1>
    <form id="formularioCadastro">
      <label for="nome">Nome:</label>
      <input
        type="text"
        placeholder="Digite seu nome aqui"
        name="nome"
        id="nome"
        required
      />
      <br />
      <br />

      <label for="email">Email:</label>
      <input
        type="text"
        placeholder="Digite seu email aqui"
        name="email"
        id="email"
        required
      />
      <br />
      <br />

      <label for="senha">Senha:</label>
      <input
        type="password"
        placeholder="Crie sua senha aqui"
        name="senha"
        id="senha"
        required
      />
      <br />
      <br />

      <label for="perfil">Tipo de perfil:</label>
      <select name="perfil" id="perfil" required>
        <option value="" disabled selected>Selecione uma opção</option>
        <option value="leitor">Leitor</option>
        <option value="bibliotecario">Bibliotecario</option>
      </select>
      <br />
      <br />

      <button type="submit" id="registrar">Registrar</button>
      <br>
    </form>

    <hr>

    <h2>Login de usuários</h2>
    <form id="formularioLogin">
      <label for="Nome">Nome:</label>
      <input type="text" name="Nome" id="Nome" placeholder="Digite seu nome aqui" required />
      <br /><br />

      <label for="Senha">Senha:</label>
      <input type="password" name="Senha" id="Senha" placeholder="Digite sua senha aqui" required />
      <br /><br />

      <button type="submit" id="entrar">Entrar</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
