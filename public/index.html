<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca — Acesso</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="logo">📚 BiblioSystem</div>
        <p class="site-subtitle">Sistema de Gerenciamento de Empréstimos</p>
      </header>

      <main class="cards-row">
        <section class="card">
          <h2>Criar conta</h2>
          <p id="msgCadastro" class="mensagem" style="display: none"></p>
          <form id="formularioCadastro">
            <label for="nome">Nome</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome completo"
              required
            />

            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />

            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Crie uma senha"
              required
            />

            <label for="perfil">Perfil</label>
            <select id="perfil" name="perfil" required>
              <option value="" disabled selected>Selecione…</option>
              <option value="leitor">Leitor</option>
              <option value="bibliotecario">Bibliotecário</option>
            </select>

            <button type="submit" class="btn btn-primary">Cadastrar</button>
          </form>
        </section>

        <section class="card">
          <h2>Entrar</h2>
          <p id="msgLogin" class="mensagem" style="display: none"></p>
          <form id="formularioLogin">
            <label for="Email">E-mail</label>
            <input
              type="email"
              id="Email"
              name="Email"
              placeholder="seu@email.com"
              required
            />

            <label for="Senha">Senha</label>
            <input
              type="password"
              id="Senha"
              name="Senha"
              placeholder="Sua senha"
              required
            />

            <button type="submit" class="btn btn-primary">Entrar</button>
          </form>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
