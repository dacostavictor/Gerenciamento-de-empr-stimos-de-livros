<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Bibliotecário</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="bibliotecario.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="logo">Sistema bibliotecário</div>
        <p class="site-subtitle">
          Painel do Bibliotecário &mdash; <span id="nomeUsuario"></span>
        </p>
        <button
          class="btn btn-danger btn-sm"
          onclick="sair()"
          style="margin-top: 0.5rem"
        >
          Sair
        </button>
      </header>

      <section class="card" style="margin-bottom: 1.5rem">
        <h2>Cadastrar novo livro</h2>
        <p id="msgLivro" class="mensagem" style="display: none"></p>
        <form id="registrarLivro" class="form-inline">
          <div class="form-group">
            <label for="titulo">Título</label>
            <input
              type="text"
              id="titulo"
              placeholder="Título do livro"
              required
            />
          </div>
          <div class="form-group">
            <label for="autor">Autor</label>
            <input
              type="text"
              id="autor"
              placeholder="Nome do autor"
              required
            />
          </div>
          <div class="form-group">
            <label for="ano_publicacao">Ano</label>
            <input
              type="number"
              id="ano_publicacao"
              placeholder="Ex: 2020"
              step="1"
            />
          </div>
          <div class="form-group">
            <label for="quantidade_disponivel">Qtd. disponível</label>
            <input
              type="number"
              id="quantidade_disponivel"
              placeholder="Ex: 5"
              step="1"
              required
            />
          </div>
          <div class="form-group" style="align-self: flex-end">
            <button type="submit" class="btn btn-primary">Cadastrar</button>
          </div>
        </form>
      </section>

      <section class="card" style="margin-bottom: 1.5rem">
        <h2>Acervo de livros</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Ano</th>
                <th>Qtd.</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbodyLivros"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Empréstimos ativos / pendentes</h2>
        <p id="msgEmprestimo" class="mensagem" style="display: none"></p>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Leitor</th>
                <th>Livro</th>
                <th>Empréstimo</th>
                <th>Devolução prevista</th>
                <th>Status</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="tbodyEmprestimos"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="bibliotecario.js"></script>
  </body>
</html>
